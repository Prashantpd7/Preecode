<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preecode Control Center — Preview</title>
  <style>
    /* VS Code variable stubs for browser preview */
    :root {
      --vscode-sideBar-background: #1e1e1e;
      --vscode-sideBar-border: #333;
      --vscode-editorWidget-background: #252526;
      --vscode-editorWidget-border: #454545;
      --vscode-foreground: #cccccc;
      --vscode-descriptionForeground: #858585;
      --vscode-button-background: #2563EB;
      --vscode-button-foreground: #ffffff;
      --vscode-button-hoverBackground: #1d4ed8;
      --vscode-button-secondaryBackground: #3a3d41;
      --vscode-button-secondaryHoverBackground: #45494e;
      --vscode-input-background: #3c3c3c;
      --vscode-editor-background: #1e1e1e;
      --vscode-editor-foreground: #d4d4d4;
      --vscode-font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --vscode-editor-font-family: 'Cascadia Code', 'Fira Code', monospace;
      --vscode-focusBorder: #007acc;
      --vscode-progressBar-background: #2563EB;
      --vscode-testing-iconPassed: #22C55E;
      --vscode-symbolIcon-keywordForeground: #569cd6;
      --vscode-symbolIcon-stringForeground: #ce9178;
      --vscode-symbolIcon-numberForeground: #b5cea8;
      --vscode-editorLineNumber-foreground: #6a9955;
      --vscode-editor-wordHighlightStrongBackground: rgba(37,99,235,0.3);
      --vscode-statusBar-focusBorder: #007acc;
    }
    body { display: flex; justify-content: center; padding: 20px; background: #111; }
    .preview-frame {
      width: 280px; height: 700px; overflow: hidden;
      border: 1px solid #333; border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .preview-frame iframe { width: 100%; height: 100%; border: none; }
    .preview-label { color: #666; font-family: sans-serif; font-size: 11px; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
  <div>
    <div class="preview-frame">
      <iframe src="inner-preview.html"></iframe>
    </div>
    <div class="preview-label">Preecode Control Center — 280px panel width</div>
  </div>
</body>
</html>
