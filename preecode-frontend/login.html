<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Preecode – Sign In</title>
  <script src="theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="tailwind-config.js"></script>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:,">
</head>

<body class="bg-th-bg text-txt font-sans min-h-screen antialiased">

  <div class="min-h-screen flex flex-col lg:flex-row">

    <!-- ════════════════════════════════════
         LEFT SIDE – Headline Only
    ════════════════════════════════════ -->
    <div class="hidden lg:flex lg:w-1/2 items-center justify-center p-16 xl:p-24">
      <div class="login-headline-wrap">
        <a href="/" class="brand-logo logo-auth mb-12"><span class="brand-dark">Preec</span><span class="brand-accent">ode</span></a>
        <h1 class="login-headline">
          Your coding growth.<br>Measured.
        </h1>
        <p class="login-subtext">Built for developers who value progress.</p>
      </div>
    </div>

    <!-- ════════════════════════════════════
         RIGHT SIDE – Sign In Card
    ════════════════════════════════════ -->
    <div class="flex-1 flex items-center justify-center p-6 sm:p-8 lg:p-12">
      <div class="w-full max-w-[440px]">

        <!-- Mobile logo -->
        <div class="mb-10 lg:hidden">
          <a href="/" class="brand-logo logo-auth"><span class="brand-dark">Preec</span><span class="brand-accent">ode</span></a>
        </div>

        <!-- Sign In Card -->
        <div class="login-card">
          <h2 class="login-card-title">Sign in</h2>

          <!-- Form -->
          <form id="loginForm" novalidate class="login-form">
            <!-- Email -->
            <div>
              <label for="email" class="login-label">Email</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="you@example.com"
                required
                autocomplete="email"
                aria-describedby="errorMsg"
                class="login-input"
              />
            </div>

            <!-- Password -->
            <div>
              <div class="flex items-center justify-between mb-2">
                <label for="password" class="login-label mb-0">Password</label>
                <a href="#" class="login-forgot">Forgot?</a>
              </div>
              <div class="relative">
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Enter password"
                  required
                  autocomplete="current-password"
                  aria-describedby="errorMsg"
                  class="login-input pr-11"
                />
                <button type="button" class="pw-toggle" aria-label="Toggle password visibility" tabindex="-1">
                  <svg class="pw-eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                  <svg class="pw-eye-closed hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
                </button>
              </div>
            </div>

            <!-- Error message -->
            <div id="errorMsg" class="login-error" role="alert" aria-live="polite"></div>

            <!-- Submit -->
            <button
              type="submit"
              id="loginBtn"
              class="login-btn-primary"
            >
              <span id="btnText">Sign In</span>
              <svg id="btnSpinner" class="hidden animate-spin mx-auto h-5 w-5" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
            </button>
          </form>

          <!-- Divider -->
          <div class="login-divider">
            <div class="login-divider-line"></div>
            <span class="login-divider-text">or</span>
            <div class="login-divider-line"></div>
          </div>

          <!-- Social Logins -->
          <div class="login-social-row">
            <button type="button" id="googleLoginBtn" class="login-btn-social">
              <svg width="18" height="18" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              Google
            </button>
            <button type="button" class="login-btn-social">
              <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
              </svg>
              GitHub
            </button>
          </div>

          <!-- Register link -->
          <p class="login-register-link">
            Don't have an account? <a href="register.html">Create account</a>
          </p>
        </div>
      </div>
    </div>

  </div>

  <script src="api.js"></script>
  <script src="app.js"></script>

  <script>
    /* Google OAuth handler */
    document.addEventListener("DOMContentLoaded", function () {
      var googleBtn = document.getElementById("googleLoginBtn");
      if (googleBtn) {
        googleBtn.addEventListener("click", function () {
          try {
            var params = new URLSearchParams(window.location.search);
            var redirectParam = params.get('redirect');
            if (redirectParam) {
              window.location.href = API_BASE + '/auth/google?redirect=' + encodeURIComponent(redirectParam);
              return;
            }
          } catch (e) {}
          window.location.href = API_BASE + '/auth/google';
        });
      }
    });
  </script>

</body>
</html>
