<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Preecode – Profile</title>
  <script src="/theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/tailwind-config.js"></script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="bg-th-bg text-txt font-sans min-h-screen text-sm antialiased">

  <div class="app-shell min-h-screen relative z-10">
    <div class="app-main flex-1 flex flex-col">
      <div class="prof-layout">

        <!-- ═══ PROFILE HEADER ═══ -->
        <section class="prof-header prof-reveal">
          <div class="prof-header-inner">
            <div class="prof-avatar" id="profileAvatar">?</div>
            <div class="prof-header-info">
              <h1 class="prof-name" id="profileName">User</h1>
              <p class="prof-subtitle" id="profileSubtitle"></p>
            </div>
            <button id="editProfileBtn" class="prof-edit-btn">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"/></svg>
              Edit
            </button>
          </div>
        </section>

        <!-- ═══ PRIMARY METRICS ═══ -->
        <section class="prof-metrics prof-reveal">
          <div class="prof-metric">
            <span class="prof-metric-val" id="profileTotal">0</span>
            <span class="prof-metric-label">Solved</span>
          </div>
          <div class="prof-metric-divider"></div>
          <div class="prof-metric">
            <span class="prof-metric-val" id="profileAccuracy">0%</span>
            <span class="prof-metric-label">Accuracy</span>
          </div>
          <div class="prof-metric-divider"></div>
          <div class="prof-metric">
            <span class="prof-metric-val" id="profileStreak">0</span>
            <span class="prof-metric-label">Day Streak</span>
          </div>
        </section>

        <!-- ═══ TWO COLUMN LAYOUT ═══ -->
        <div class="prof-grid">

          <!-- ── LEFT COLUMN ── -->
          <div class="prof-col-left">

            <!-- XP / Level -->
            <section class="prof-card prof-reveal">
              <div class="prof-level-header">
                <div>
                  <span class="prof-level-name" id="rankName">Beginner</span>
                  <span class="prof-level-xp" id="rankXP">0 / 50 XP</span>
                </div>
                <span class="prof-level-num" id="rankLevel">1</span>
              </div>
              <div class="prof-level-track">
                <div class="prof-level-fill" id="rankBar" style="width:0%"></div>
              </div>
            </section>

            <!-- Difficulty Breakdown -->
            <section class="prof-card prof-reveal">
              <h3 class="prof-card-title">Difficulty Breakdown</h3>
              <div class="prof-diff-group">
                <div class="prof-diff-row">
                  <span class="prof-diff-name">Easy</span>
                  <div class="prof-diff-track"><div class="prof-diff-fill" id="pEasyBar" style="width:0%;background:#6ee7b7"></div></div>
                  <span class="prof-diff-count" id="pEasyCount">0</span>
                </div>
                <div class="prof-diff-row">
                  <span class="prof-diff-name">Medium</span>
                  <div class="prof-diff-track"><div class="prof-diff-fill" id="pMedBar" style="width:0%;background:#d4d4d8"></div></div>
                  <span class="prof-diff-count" id="pMedCount">0</span>
                </div>
                <div class="prof-diff-row">
                  <span class="prof-diff-name">Hard</span>
                  <div class="prof-diff-track"><div class="prof-diff-fill" id="pHardBar" style="width:0%;background:#a1a1aa"></div></div>
                  <span class="prof-diff-count" id="pHardCount">0</span>
                </div>
              </div>
            </section>

            <!-- Recent Activity -->
            <section class="prof-card prof-reveal">
              <h3 class="prof-card-title">Recent Activity</h3>
              <p class="prof-card-desc">Last 7 days</p>
              <div class="activity-heatmap" id="activityHeatmap"></div>
              <div class="prof-heatmap-legend">
                <span class="prof-legend-text">Less</span>
                <div class="heatmap-legend-cell l0"></div>
                <div class="heatmap-legend-cell l1"></div>
                <div class="heatmap-legend-cell l2"></div>
                <div class="heatmap-legend-cell l3"></div>
                <div class="heatmap-legend-cell l4"></div>
                <span class="prof-legend-text">More</span>
              </div>
            </section>

          </div>

          <!-- ── RIGHT COLUMN ── -->
          <div class="prof-col-right">

            <!-- Weekly Overview -->
            <section class="prof-card prof-reveal">
              <h3 class="prof-card-title">Weekly Overview</h3>
              <div class="prof-overview-stats">
                <div class="prof-overview-item">
                  <span class="prof-overview-val" id="weekSolved">0</span>
                  <span class="prof-overview-label">This Week</span>
                </div>
                <div class="prof-overview-item">
                  <span class="prof-overview-val" id="weekPoints">0</span>
                  <span class="prof-overview-label">Points Earned</span>
                </div>
              </div>
            </section>

            <!-- Badges -->
            <section class="prof-card prof-reveal">
              <div class="prof-badges-header">
                <h3 class="prof-card-title">Badges</h3>
                <button class="prof-view-all" id="viewAllBadges" style="display:none">View All</button>
              </div>
              <div class="prof-badges-grid" id="badgesGrid">
                <!-- First Solve -->
                <div class="prof-badge locked" data-badge="firstSolve">
                  <span class="prof-badge-icon">&#127941;</span>
                  <div class="prof-badge-info">
                    <span class="prof-badge-name">First Solve</span>
                    <div class="prof-badge-bar"><div class="prof-badge-fill" id="badgeFirstBar" style="width:0%"></div></div>
                  </div>
                </div>
                <!-- 7-Day Streak -->
                <div class="prof-badge locked" data-badge="7day">
                  <span class="prof-badge-icon">&#128293;</span>
                  <div class="prof-badge-info">
                    <span class="prof-badge-name">7-Day Streak</span>
                    <div class="prof-badge-bar"><div class="prof-badge-fill" id="badge7day" style="width:0%"></div></div>
                  </div>
                </div>
                <!-- 50 Problems (hidden by default) -->
                <div class="prof-badge locked prof-badge-extra" data-badge="50problems" style="display:none">
                  <span class="prof-badge-icon">&#11088;</span>
                  <div class="prof-badge-info">
                    <span class="prof-badge-name">50 Problems</span>
                    <div class="prof-badge-bar"><div class="prof-badge-fill" id="badge50" style="width:0%"></div></div>
                  </div>
                </div>
                <!-- Hard Master (hidden by default) -->
                <div class="prof-badge locked prof-badge-extra" data-badge="hardMaster" style="display:none">
                  <span class="prof-badge-icon">&#128142;</span>
                  <div class="prof-badge-info">
                    <span class="prof-badge-name">Hard Master</span>
                    <div class="prof-badge-bar"><div class="prof-badge-fill" id="badgeHard" style="width:0%"></div></div>
                  </div>
                </div>
              </div>
            </section>

          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- Edit Profile Modal -->
  <div id="editProfileModal" class="modal-overlay hidden">
    <div class="modal-panel">
      <div class="flex items-center justify-between p-6 border-b border-bdr">
        <h3 class="text-lg font-bold text-txt">Edit Profile</h3>
        <button id="closeEditModal" class="text-txt-muted hover:text-txt text-2xl leading-none cursor-pointer">&times;</button>
      </div>
      <form id="editProfileForm" class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-semibold text-txt-sec mb-2">Username</label>
          <input type="text" id="editUsername" placeholder="Enter username" class="w-full px-4 py-2.5 bg-th-input border border-bdr-strong rounded-lg text-txt placeholder-txt-faint focus:border-accent focus:outline-none transition-colors" required />
        </div>
        <div>
          <label class="block text-sm font-semibold text-txt-sec mb-2">Profile Picture URL (optional)</label>
          <input type="url" id="editAvatar" placeholder="Enter profile picture URL" class="w-full px-4 py-2.5 bg-th-input border border-bdr-strong rounded-lg text-txt placeholder-txt-faint focus:border-accent focus:outline-none transition-colors" />
        </div>
        <div class="flex gap-3 pt-4">
          <button type="button" id="cancelEditModal" class="flex-1 px-4 py-2.5 bg-th-hover hover:bg-th-surface text-txt font-semibold rounded-lg border border-bdr transition-colors cursor-pointer">Cancel</button>
          <button type="submit" class="flex-1 px-4 py-2.5 bg-accent hover:bg-accent-hover text-txt-inv font-semibold rounded-lg transition-colors cursor-pointer">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/api.js"></script>
  <script src="/layout/layout.js"></script>
  <script src="/layout/chatbot.js"></script>
  <script src="/layout/early-access.js"></script>
  <script src="/pages/profile.js"></script>
</body>
</html>
